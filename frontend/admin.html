<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | EventPass</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-layout { padding: 2rem; }
        .table-container { margin-top: 2rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--glass-bg); border-radius: 12px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); color: var(--text-primary); }
        th { background: rgba(255,255,255,0.05); font-weight: 600; }
        .action-btns { display: flex; gap: 0.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        input, textarea { padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: inherit; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <a href="index.html" style="color: var(--accent-color); text-decoration: none; margin-bottom: 2rem; display: inline-block;">⬅️ Retour à l'accueil</a>
        
        <header class="section-header">
            <h1>Panneau d'Administration (CRUD)</h1>
            <p>Ajoutez, modifiez ou supprimez des événements directement dans la base de données MongoDB.</p>
        </header>

        <div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
            <h2 id="formTitle">Ajouter un Événement</h2>
            <form id="eventForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="eventId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Titre de l'événement *</label>
                        <input type="text" id="titre" required placeholder="Ex: Concert X">
                    </div>
                    <div class="form-group">
                        <label>Lieu *</label>
                        <input type="text" id="lieu" required placeholder="Ex: Stade de l'Amitié">
                    </div>
                    <div class="form-group">
                        <label>Date et Heure *</label>
                        <input type="datetime-local" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Prix (FCFA) *</label>
                        <input type="number" id="prix" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Capacité totale *</label>
                        <input type="number" id="capacite" required min="1">
                    </div>
                    <div class="form-group">
                        <label>URL de l'image</label>
                        <input type="url" id="image" placeholder="https://images.unsplash.com/...">
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Ajouter l'événement</button>
                    <button type="button" class="btn btn-secondary" style="background: rgba(255,255,255,0.1); color: white;" onclick="resetForm()">Annuler / Vider</button>
                </div>
            </form>
        </div>

        <h2>Liste des Événements Existants</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Date</th>
                        <th>Lieu</th>
                        <th>Prix (FCFA)</th>
                        <th>Disponibilité</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                    <!-- Events will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let isEditing = false;

        const currentUser = JSON.parse(localStorage.getItem('billetterieUser') || 'null');
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', loadEvents);

        async function loadEvents() {
            try {
                const response = await fetch(`${API_URL}/evenements`);
                const events = await response.json();
                const tbody = document.getElementById('eventsTableBody');
                tbody.innerHTML = '';

                events.forEach(ev => {
                    const tr = document.createElement('tr');
                    const d = new Date(ev.date);
                    tr.innerHTML = `
                        <td>${ev.titre}</td>
                        <td>${d.toLocaleDateString('fr-FR')} à ${d.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})}</td>
                        <td>${ev.lieu}</td>
                        <td>${ev.prix.toLocaleString('fr-FR')}</td>
                        <td>${ev.places_disponibles} / ${ev.capacite_totale}</td>
                        <td class="action-btns">
                            <button class="btn" style="background: var(--warning); padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick='editEvent(${JSON.stringify(ev).replace(/'/g, "&#39;")})'>Modifier</button>
                            <button class="btn" style="background: var(--danger); padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="deleteEvent('${ev._id}')">Supprimer</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Erreur de chargement", error);
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const eventData = {
                titre: document.getElementById('titre').value,
                lieu: document.getElementById('lieu').value,
                date: document.getElementById('date').value,
                prix: Number(document.getElementById('prix').value),
                capacite_totale: Number(document.getElementById('capacite').value),
                places_disponibles: Number(document.getElementById('capacite').value), // Initialement égal à la capacité totale
                image: document.getElementById('image').value || undefined,
                description: document.getElementById('description').value
            };

            const eventId = document.getElementById('eventId').value;
            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/evenements/${eventId}` : `${API_URL}/evenements`;

            // Si on modifie, on ne veut pas écraser les places_disponibles brutalement (simplification pour l'admin)
            if (isEditing) {
                delete eventData.places_disponibles; 
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(eventData)
                });

                if (response.ok) {
                    alert(`Événement ${isEditing ? 'modifié' : 'ajouté'} avec succès !`);
                    resetForm();
                    loadEvents();
                } else {
                    const err = await response.json();
                    alert('Erreur: ' + (err.message || 'Données invalides'));
                }
            } catch (error) {
                alert('Erreur réseau');
            }
        }

        function editEvent(ev) {
            isEditing = true;
            document.getElementById('formTitle').innerText = 'Modifier l\'Événement';
            document.getElementById('submitBtn').innerText = 'Enregistrer les modifications';
            
            document.getElementById('eventId').value = ev._id;
            document.getElementById('titre').value = ev.titre;
            document.getElementById('lieu').value = ev.lieu;
            document.getElementById('prix').value = ev.prix;
            document.getElementById('capacite').value = ev.capacite_totale;
            document.getElementById('description').value = ev.description || '';
            document.getElementById('image').value = ev.image || '';

            // Format date for datetime-local input
            const d = new Date(ev.date);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            document.getElementById('date').value = d.toISOString().slice(0, 16);
            
            window.scrollTo(0, 0);
        }

        function resetForm() {
            isEditing = false;
            document.getElementById('formTitle').innerText = 'Ajouter un Événement';
            document.getElementById('submitBtn').innerText = 'Ajouter l\'événement';
            document.getElementById('eventForm').reset();
            document.getElementById('eventId').value = '';
        }

        async function deleteEvent(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cet événement définitivement de MongoDB ?')) return;

            try {
                const response = await fetch(`${API_URL}/evenements/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Événement supprimé !');
                    loadEvents();
                } else {
                    alert('Erreur lors de la suppression');
                }
            } catch (error) {
                alert('Erreur réseau');
            }
        }
    </script>
</body>
</html>
