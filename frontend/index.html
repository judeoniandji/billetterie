<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPass — Billetterie événementielle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header" id="mainHeader">
        <div class="container header__inner">
            <a href="#/" class="logo" id="logoLink" data-nav>
                <span class="logo__icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v1H2V9z"/><path d="M2 10v9a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3v-9"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </span>
                <span class="logo__text">EventPass</span>
            </a>

            <nav class="nav" id="mainNav">
                <a href="#/" class="nav__link" data-nav>Accueil</a>
                <a href="#/events" class="nav__link" data-nav>Événements</a>
                <a href="#/reservations" class="nav__link" data-nav>Mes billets</a>
            </nav>

            <div class="header__actions">
                <div id="userProfile" class="user-profile" hidden>
                    <div class="user-profile__avatar" id="userAvatar">U</div>
                    <div class="user-profile__info">
                        <span id="userName" class="user-profile__name"></span>
                        <button class="user-profile__logout" onclick="App.auth.logout()">Déconnexion</button>
                    </div>
                </div>
                <button id="loginBtn" class="btn btn--primary btn--sm" onclick="App.auth.openModal()">
                    Connexion
                </button>
                <button class="nav-toggle" id="navToggle" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main SPA View -->
    <main id="app" class="app"></main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer__inner">
            <div class="footer__brand">
                <span class="logo__text">Eventia</span>
                <p>La billetterie événementielle moderne, fluide et premium.</p>
            </div>
            <div class="footer__links">
                <a href="#/events" data-nav>Événements</a>
                <a href="#/reservations" data-nav>Mes billets</a>
                <a href="admin.html" id="footerAdminLink" hidden>Administration</a>
            </div>
            <p class="footer__copy">&copy; 2026 EventPass. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Auth Modal -->
    <div class="modal" id="authModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" onclick="App.auth.closeModal()"></div>
        <div class="modal__panel">
            <button class="modal__close" onclick="App.auth.closeModal()" aria-label="Fermer">&times;</button>
            <h2 class="modal__title">Bienvenue sur EventPass</h2>
            <p class="modal__subtitle">Connectez-vous pour réserver vos places</p>

            <div class="auth-tabs">
                <button class="auth-tabs__btn active" data-auth-tab="login">Connexion</button>
                <button class="auth-tabs__btn" data-auth-tab="register">Inscription</button>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="App.auth.login(event)">
                <div class="form-field">
                    <label for="loginTelephone">Téléphone</label>
                    <input type="tel" id="loginTelephone" placeholder="+241 07 XX XX XX" required>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Se connecter</button>
            </form>

            <form id="registerForm" class="auth-form" hidden onsubmit="App.auth.register(event)">
                <div class="form-row">
                    <div class="form-field">
                        <label for="regPrenom">Prénom</label>
                        <input type="text" id="regPrenom" required>
                    </div>
                    <div class="form-field">
                        <label for="regNom">Nom</label>
                        <input type="text" id="regNom" required>
                    </div>
                </div>
                <div class="form-field">
                    <label for="regTelephone">Téléphone</label>
                    <input type="tel" id="regTelephone" required>
                </div>
                <div class="form-field">
                    <label for="regVille">Ville</label>
                    <select id="regVille">
                        <option value="Libreville">Libreville</option>
                        <option value="Port-Gentil">Port-Gentil</option>
                        <option value="Franceville">Franceville</option>
                        <option value="Owendo">Owendo</option>
                        <option value="Akanda">Akanda</option>
                    </select>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Créer mon compte</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" hidden>
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
