<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetterie Gabonaise</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🎫</span>
                    <span class="logo-text">Billetterie Gabonaise</span>
                </div>
                <div class="header-actions">
                    <div id="userProfile" class="user-profile" style="display: none;">
                        <div class="user-avatar">👤</div>
                        <div class="user-info">
                            <span id="userName"></span>
                            <button class="btn-logout" onclick="logout()">Se déconnecter</button>
                        </div>
                    </div>
                    <button id="loginBtn" class="btn btn-primary" onclick="openUserModal()">
                        <span>👤</span> Se connecter / S'inscrire
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="main-nav">
        <div class="container">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('events')">
                    <span>🎪</span> Événements
                </button>
                <button class="tab-btn" onclick="switchTab('reservations')">
                    <span>📋</span> Mes réservations
                </button>
                <button class="tab-btn" onclick="switchTab('dashboard')">
                    <span>📊</span> Statistiques
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Events Tab -->
            <div id="events" class="tab-content active">
                <!-- Filters -->
                <div class="filters-section">
                    <h2 class="section-title">Trouve ton événement</h2>
                    <div class="filters-grid">
                        <div class="filter-group">
                            <input type="text" id="searchInput" placeholder="🔍 Rechercher un événement..." oninput="filterEvents()">
                        </div>
                        <div class="filter-group">
                            <select id="lieuFilter" onchange="filterEvents()">
                                <option value="">Tous les lieux</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <select id="prixMaxFilter" onchange="filterEvents()">
                                <option value="">Tous les prix</option>
                                <option value="5000">Moins de 5 000 FCFA</option>
                                <option value="10000">Moins de 10 000 FCFA</option>
                                <option value="20000">Moins de 20 000 FCFA</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <button class="btn btn-secondary" onclick="resetFilters()">🔄 Réinitialiser</button>
                        </div>
                    </div>
                </div>

                <!-- Events Grid -->
                <div id="eventsGrid" class="events-grid">
                    <p class="loading">Chargement des événements...</p>
                </div>
            </div>

            <!-- Reservations Tab -->
            <div id="reservations" class="tab-content">
                <h2 class="section-title">Mes réservations</h2>
                <div id="reservationsList" class="reservations-list">
                    <p class="loading">Connecte-toi pour voir tes réservations</p>
                </div>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content">
                <h2 class="section-title">Statistiques des recettes</h2>
                <div id="statsGrid" class="stats-grid">
                    <p class="loading">Chargement des statistiques...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- User Modal -->
    <div class="modal" id="userModal">
        <div class="modal-wrapper">
            <div class="modal-content">
                <button class="modal-close" onclick="closeUserModal()">×</button>
                
                <!-- Auth Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('register')">S'inscrire</button>
                    <button class="auth-tab" onclick="switchAuthTab('login')">Se connecter</button>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="regPrenom" placeholder="Votre prénom">
                    </div>
                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="regNom" placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label>Téléphone *</label>
                        <input type="tel" id="regTelephone" placeholder="Ex: 06 00 00 00">
                    </div>
                    <div class="form-group">
                        <label>Ville</label>
                        <select id="regVille">
                            <option value="Libreville">Libreville</option>
                            <option value="Port-Gentil">Port-Gentil</option>
                            <option value="Franceville">Franceville</option>
                            <option value="Owendo">Owendo</option>
                            <option value="Akanda">Akanda</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="registerUser()">Créer un compte</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label>Téléphone *</label>
                        <input type="tel" id="loginTelephone" placeholder="Votre numéro de téléphone">
                    </div>
                    <button class="btn btn-primary btn-full" onclick="loginUser()">Se connecter</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal" id="bookingModal">
        <div class="modal-wrapper">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">×</button>
                <h3>Réserver un événement</h3>
                <p id="modalEventTitle"></p>
                <input type="hidden" id="modalEventId">
                <div class="form-group">
                    <label>Nombre de places *</label>
                    <input type="number" id="ticketsCount" min="1" value="1">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button class="btn btn-success" onclick="submitBooking()">Confirmer la réservation</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
